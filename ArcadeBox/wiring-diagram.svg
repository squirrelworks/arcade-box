<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<style>
  svg { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .board-body { fill: #F1EFE8; stroke: #888780; stroke-width: 1.5; }
  .pin { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
  .usb { fill: #D3D1C7; stroke: #888780; stroke-width: 1; }
  .teal-box { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .teal-title { font-size: 14px; font-weight: 500; fill: #085041; }
  .teal-shape { fill: none; stroke: #0F6E56; stroke-width: 1.5; opacity: 0.6; }
</style>

<rect class="board-body" x="160" y="80" width="240" height="200" rx="8"/>
<text class="th" x="280" y="115" text-anchor="middle">Pro Micro</text>
<text class="ts" x="280" y="135" text-anchor="middle">ATmega32U4</text>

<rect class="usb" x="240" y="66" width="80" height="24" rx="4"/>
<text class="ts" x="280" y="82" text-anchor="middle">USB</text>

<rect class="pin" x="160" y="190" width="36" height="18" rx="3"/>
<text class="ts" x="178" y="203" text-anchor="middle">GND</text>

<rect class="pin" x="364" y="190" width="36" height="18" rx="3"/>
<text class="ts" x="382" y="203" text-anchor="middle">Pin 2</text>

<rect class="teal-box" x="490" y="140" width="140" height="80" rx="10"/>
<circle class="teal-shape" cx="560" cy="172" r="20"/>
<text class="teal-title" x="560" y="210" text-anchor="middle">Arcade-knap</text>

<path d="M490 168 L420 168 L420 199 L400 199" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="490" cy="168" r="3.5" fill="#1D9E75"/>

<path d="M490 192 L460 192 L460 240 L140 240 L140 199 L160 199" fill="none" stroke="#888780" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="490" cy="192" r="3.5" fill="#888780"/>

<text class="th" x="40" y="40" text-anchor="start">Forbindelsesdiagram</text>

<line x1="40" y1="62" x2="65" y2="62" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<text class="ts" x="72" y="66">Signal (knap til Pin 2)</text>

<line x1="40" y1="82" x2="65" y2="82" stroke="#888780" stroke-width="2.5" stroke-linecap="round"/>
<text class="ts" x="72" y="86">GND (jord / minus)</text>

</svg>
